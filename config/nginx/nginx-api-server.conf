# ══════════════════════════════════════════════════════════════
# Server B (103.97.209.194) — api.wowgift.co.kr
# Go API 서버 리버스 프록시 + SSL 종료
#
# 배치 경로: C:\nginx\conf\nginx.conf
# SSL 인증서: C:\nginx\ssl\
# ══════════════════════════════════════════════════════════════

worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ── 성능 ──
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 70;

    # ── 로깅 ──
    access_log logs/access.log;
    error_log  logs/error.log;

    # ── 본문 크기 제한 (바우처 대량 업로드 고려) ──
    client_max_body_size 10m;

    # ── Gzip 압축 (JSON API 응답) ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_comp_level 5;

    # ── 스캐너 봇 User-Agent 차단 ──
    map $http_user_agent $is_scanner {
        default 0;
        ~*PetalBot 1;
        ~*python-urllib 1;
        ~*python-requests 1;
        ~*libredtail 1;
        ~*PAN.GlobalProtect 1;
        ~*Nuclei 1;
        ~*Nikto 1;
        ~*sqlmap 1;
        ~*dirbuster 1;
        ~*gobuster 1;
        ~*masscan 1;
        ~*zgrab 1;
        ~*Nmap 1;
    }

    # ── Rate Limiting 존 정의 ──
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;

    # ══════════════════════════════════════════
    # HTTP → HTTPS 리다이렉트
    # ══════════════════════════════════════════

    server {
        listen 80;
        server_name api.wowgift.co.kr;
        return 301 https://$host$request_uri;
    }

    # ══════════════════════════════════════════
    # HTTPS — api.wowgift.co.kr → Go API (:52201)
    # ══════════════════════════════════════════

    server {
        listen 443 ssl;
        http2 on;
        server_name api.wowgift.co.kr;

        # ── SSL 인증서 ──
        ssl_certificate     C:/nginx/ssl/wowgift.co.kr/fullchain.pem;
        ssl_certificate_key C:/nginx/ssl/wowgift.co.kr/privkey.pem;

        # ── SSL 프로토콜/암호화 ──
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── 보안 헤더 (Go 서버에서도 설정하지만 이중 방어) ──
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── 허용되지 않는 HTTP 메서드 차단 ──
        if ($request_method !~ ^(GET|HEAD|POST|PUT|PATCH|DELETE|OPTIONS)$) {
            return 444;
        }

        # ── 스캐너 봇 차단 ──
        if ($is_scanner) {
            return 444;
        }

        # ── 민감 dotfiles 차단 (.env, .git 등) ──
        location ~ /\.(?!well-known) {
            access_log off;
            return 444;
        }

        # ── 스크립트/CMS 프로브 차단 ──
        location ~* \.(php|cgi|asp|aspx|jsp|py|rb|pl|sh|bat|cmd|exe|dll|com)$ {
            access_log off;
            return 444;
        }

        location ~* ^/(vendor|phpunit|laravel|wordpress|wp-admin|wp-login|wp-content|wp-includes|xmlrpc|phpmyadmin|adminer|phpinfo|actuator) {
            access_log off;
            return 444;
        }

        # ── VPN/RDP 스캐너 차단 ──
        location ~* ^/(owa|ecp|RDWeb|Remote|dana-na|sslvpn|vpntunnel|global-protect|ssl-vpn|sonicui|remote/login) {
            access_log off;
            return 444;
        }

        # ── 인프라 프로브 차단 ──
        location ~* ^/(api/v1/pods|api/v1/nodes|containers/json|wsman) {
            access_log off;
            return 444;
        }

        # ── 인증 경로 Rate Limit (브루트포스 방어) ──
        location /api/v1/auth/ {
            limit_req zone=api_auth burst=10 nodelay;
            proxy_pass http://127.0.0.1:52201;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # ── 헬스체크 (내부만 허용) ──
        location = /health {
            allow 127.0.0.1;
            allow 103.97.209.205;
            deny all;
            proxy_pass http://127.0.0.1:52201;
        }

        # ── 기본: 모든 API 요청 → Go 서버 ──
        location / {
            limit_req zone=api_general burst=50 nodelay;
            proxy_pass http://127.0.0.1:52201;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }
    }
}
