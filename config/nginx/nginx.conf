worker_processes auto;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ── 서버 정보 숨김 (핑거프린팅 방지) ──
    # Server 헤더에서 nginx 버전 제거. 공격자의 CVE 매칭 난이도↑.
    server_tokens off;

    # ── 성능 ──
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 70;
    keepalive_requests 1000;

    # ── Slowloris 방어 (커넥션 고갈 공격 대응) ──
    client_header_timeout 10s;
    client_body_timeout   10s;
    send_timeout          10s;
    reset_timedout_connection on;

    access_log logs/access.log;
    error_log  logs/error.log warn;

    # ── Gzip 압축 ──
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_comp_level 5;

    # ── 프록시 버퍼 ──
    proxy_buffer_size 8k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;
    client_max_body_size 15m;          # paysolus 업로드 여유
    client_body_buffer_size 128k;

    # 백엔드 정보 노출 차단
    proxy_hide_header X-Powered-By;
    proxy_hide_header X-AspNet-Version;
    proxy_hide_header X-AspNetMvc-Version;

    # ── TLS 공통 하드닝 ──
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # TLS 1.2/1.3 에서 forward-secrecy cipher 만 허용.
    ssl_ciphers         ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:HIGH:!aNULL:!MD5:!RC4:!3DES:!SHA1;
    ssl_prefer_server_ciphers off;

    # ── WebSocket 연결을 위한 헤더 매핑 ──
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ══════════════════════════════════════════
    # 스캐너 봇 User-Agent 차단
    # ──────────────────────────────────────────
    # 주의: curl/Wget/Go-http-client/HttpClient 는 합법 클라이언트 광범위 사용.
    # 특히 Seedream Pay 가 Go 로 webhook 송신 시 Go-http-client UA 기본값.
    # → 이 4종은 포함 금지 (2026-04-24 webhook 차단 회귀 원인).
    # ══════════════════════════════════════════
    map $http_user_agent $is_scanner {
        default              0;
        ""                   1;          # 빈 UA 는 대부분 봇
        ~*PetalBot           1;
        ~*python-urllib      1;
        ~*python-requests    1;
        ~*libwww-perl        1;
        ~*libredtail         1;
        ~*PAN\.GlobalProtect 1;
        ~*sqlmap             1;
        ~*Nikto              1;
        ~*Nuclei             1;
        ~*dirbuster          1;
        ~*gobuster           1;
        ~*ffuf               1;
        ~*wfuzz              1;
        ~*masscan            1;
        ~*zgrab              1;
        ~*nmap               1;
        ~*acunetix           1;
        ~*nessus             1;
        ~*openvas            1;
        ~*wpscan             1;
        ~*Scrapy             1;
        ~*semrush            1;
        ~*ahrefs             1;
        ~*mj12bot            1;
    }

    # ══════════════════════════════════════════
    # Cloudflare 실 IP 복원 (wowgift.co.kr + seedreamgift.com 공통)
    # ──────────────────────────────────────────
    # 두 도메인 모두 CF 오렌지 구름(프록시) 모드 사용 중. $remote_addr이 CF 에지 IP로
    # 바뀌는 회귀를 막기 위해 CF-Connecting-IP 헤더에서 실 IP를 복원합니다.
    # http{} 스코프라 모든 server 블록에 적용.
    #
    # real_ip_recursive on: X-Forwarded-For 체인에서 첫 비신뢰 IP를 실 IP로 채택
    # CF IP 갱신: https://www.cloudflare.com/ips/  (분기별 확인 권장)
    # ══════════════════════════════════════════
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # ══════════════════════════════════════════
    # Rate / Connection limit zones
    # ──────────────────────────────────────────
    # perip  : IP당 동시 커넥션 (슬로우 클라이언트/커넥션 DDoS 방어)
    # perserver: 서버 전체 동시 커넥션 상한 (봇넷 분산 공격 방어)
    # ══════════════════════════════════════════
    limit_req_zone  $binary_remote_addr zone=api_general:10m       rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=seedream_webhook:10m  rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=perip:10m;
    limit_conn_zone $server_name        zone=perserver:10m;

    # ══════════════════════════════════════════
    # 업스트림: 도메인별 분리 운영
    # ──────────────────────────────────────────
    #   wowgift.co.kr     → 103.97.209.194:52201 (기존 운영)
    #   seedreamgift.com  → 103.97.209.131:52201 (신규, API+MSSQL 동거)
    # ══════════════════════════════════════════
    upstream wowgift_api {
        server 103.97.209.194:52201;
        keepalive 32;
    }

    upstream seedream_api {
        server 103.97.209.131:52201;
        keepalive 32;
    }

    # ══════════════════════════════════════════════════════════════════
    # [0] CATCH-ALL default_server — 도메인 크로스오버 차단
    # ──────────────────────────────────────────────────────────────────
    # 3개 지정 도메인 (wowgift.co.kr / seedreamgift.com / paysolus.kr) 외
    # 모든 요청을 여기서 차단.
    #
    # HTTPS 는 ssl_reject_handshake on 으로 TLS handshake 자체 reject:
    #   - dummy 인증서 불필요 (ssl_certificate 와 mutually exclusive)
    #   - SNI 매칭 실패 시 cert 제공 없이 즉시 끊김 → 정보 노출 0
    #   - nginx 1.19.4+ 필요 (현재 운영 1.26.3 OK)
    # HTTP 는 return 444 (connection close without response).
    # ══════════════════════════════════════════════════════════════════
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    server {
        listen 443 ssl default_server;
        http2 on;
        ssl_reject_handshake on;
    }

    # ══════════════════════════════════════════════════════════════════
    # ▌▌ wowgift.co.kr (기존 운영)
    # ══════════════════════════════════════════════════════════════════

    # HTTP → HTTPS 리다이렉트
    server {
        listen 80;
        server_name wowgift.co.kr www.wowgift.co.kr;

        location /.well-known/pki-validation/ {
            alias C:/nginx/html/.well-known/pki-validation/;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── 고객 사이트 (HTTPS) ──
    server {
        listen 443 ssl;
        http2 on;
        server_name wowgift.co.kr www.wowgift.co.kr;

        ssl_certificate     C:/nginx/ssl/wowgift.co.kr/fullchain.pem;
        ssl_certificate_key C:/nginx/ssl/wowgift.co.kr/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_stapling on;
        ssl_stapling_verify on;

        # 도메인별 로그 분리 (포렌식 용이)
        access_log logs/wowgift.access.log;
        error_log  logs/wowgift.error.log warn;

        # ── 보안 헤더 ──
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff"        always;
        add_header X-Frame-Options           "SAMEORIGIN"     always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin"   always;
        add_header Cross-Origin-Resource-Policy "same-site"   always;

        # ── 공통 보안 차단 (wowgift) ──
        if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS|HEAD)$) { return 444; }
        if ($is_scanner) { return 444; }

        # 동시 커넥션 (DDoS 완화)
        limit_conn perip    20;
        limit_conn perserver 2000;

        # ── 익스플로잇 경로 차단 (22종) ──
        location ~ /\.(?!well-known)            { access_log off; return 444; }
        location ~* \.(php|cgi|asp|aspx|jsp|py|rb|pl|sh|bat|cmd|exe|dll|com)$ { access_log off; return 444; }
        location ~* ^/(vendor|phpunit|lib|laravel|yii|zend|drupal|wordpress|wp-admin|wp-login|wp-content|wp-includes|xmlrpc) { access_log off; return 444; }
        location ~* ^/(owa|ecp|RDWeb|Remote|dana-na|sslvpn|vpntunnel|global-protect|ssl-vpn|sonicui|remote/login) { access_log off; return 444; }
        location ~* ^/(api/v1/pods|api/v1/nodes|containers/json|v1/statement|api/sonicos|wsman|actuator) { access_log off; return 444; }
        location ~* ^/(phpmyadmin|adminer|phpinfo|debug|_profiler|telescope|horizon) { access_log off; return 444; }
        location ~* (backup|dump|db)\.(zip|tar|gz|sql|bak)$ { access_log off; return 444; }
        location ~* (aws-secret|credentials|config)\.(json|yml|yaml)$ { access_log off; return 444; }
        location ~* (app\.yaml|docker-compose|Dockerfile|Makefile|Gemfile)$ { access_log off; return 444; }
        location ~* ^/(SDK|cgi-bin|geoserver|webui|webdb|websql|webadmin) { access_log off; return 444; }
        location ~* ^/(debug/pprof|metrics|resolve|query|dns-query) { access_log off; return 444; }
        location ~* ^/api/(upload|uploads|upwload|media|images|photos|gallery|files|documents|attachments|content|assets|account|profile|users)(/|$) { access_log off; return 444; }
        location ~* ^/api/(stripe|webhook|credentials|config|login|user)\.(js|ts|json)$ { access_log off; return 444; }
        location ~* ^/api/v2/ { access_log off; return 444; }
        location ~* ^/(Dr0v|aab9|aaa9)$ { access_log off; return 444; }

        # ── SPA 정적 파일 서빙 (wow-gift 전용 root) ──
        root C:/deploy-server/wow-gift/client;
        index index.html;

        location = / {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options    "nosniff"        always;
            add_header X-Frame-Options           "SAMEORIGIN"     always;
            add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
            try_files /index.html =404;
        }

        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ── API → wowgift 백엔드 (103.97.209.194) ──
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://wowgift_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # ── 관리자 SPA — wowgift 기존 경로 (obfuscated) ──
        location /wow_admin_837/ {
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /wow_admin_837/index.html;
        }

        # ── SPA fallback ──
        location / {
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /index.html;
        }
    }

    # ══════════════════════════════════════════════════════════════════
    # ▌▌ seedreamgift.com (CF 프록시, Seedream Pay 연동)
    # ══════════════════════════════════════════════════════════════════

    # HTTP → HTTPS 리다이렉트
    server {
        listen 80;
        server_name seedreamgift.com www.seedreamgift.com;

        location /.well-known/pki-validation/ {
            alias C:/nginx/html/.well-known/pki-validation/;
        }
        location /.well-known/acme-challenge/ {
            alias C:/nginx/html/.well-known/acme-challenge/;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── 고객 사이트 (HTTPS) ──
    server {
        listen 443 ssl;
        http2 on;
        server_name seedreamgift.com www.seedreamgift.com;

        # 옵션 A (권장): Cloudflare Origin Certificate — 15년 무료, CF↔Origin 전용
        #   발급: CF 대시보드 → SSL/TLS → Origin Server → Create Certificate
        #   CF SSL 모드는 반드시 "Full (strict)"
        # 옵션 B: Let's Encrypt (win-acme)
        ssl_certificate     C:/nginx/ssl/seedreamgift.com/fullchain.pem;
        ssl_certificate_key C:/nginx/ssl/seedreamgift.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_stapling on;
        ssl_stapling_verify on;

        access_log logs/seedream.access.log;
        error_log  logs/seedream.error.log warn;

        # ── 보안 헤더 ──
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff"        always;
        add_header X-Frame-Options           "SAMEORIGIN"     always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=(self)" always;
        add_header Cross-Origin-Opener-Policy "same-origin"   always;
        # payment=(self) 유지: 결제 위젯(키움페이) 은 iframe/redirect 방식이라 self 허용.

        # ── 공통 보안 차단 (seedream) ──
        if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS|HEAD)$) { return 444; }
        if ($is_scanner) { return 444; }

        limit_conn perip    20;
        limit_conn perserver 2000;

        # ── 익스플로잇 경로 차단 (wowgift 와 동일 세트) ──
        location ~ /\.(?!well-known)            { access_log off; return 444; }
        location ~* \.(php|cgi|asp|aspx|jsp|py|rb|pl|sh|bat|cmd|exe|dll|com)$ { access_log off; return 444; }
        location ~* ^/(vendor|phpunit|lib|laravel|yii|zend|drupal|wordpress|wp-admin|wp-login|wp-content|wp-includes|xmlrpc) { access_log off; return 444; }
        location ~* ^/(owa|ecp|RDWeb|Remote|dana-na|sslvpn|vpntunnel|global-protect|ssl-vpn|sonicui|remote/login) { access_log off; return 444; }
        location ~* ^/(api/v1/pods|api/v1/nodes|containers/json|v1/statement|api/sonicos|wsman|actuator) { access_log off; return 444; }
        location ~* ^/(phpmyadmin|adminer|phpinfo|debug|_profiler|telescope|horizon) { access_log off; return 444; }
        location ~* (backup|dump|db)\.(zip|tar|gz|sql|bak)$ { access_log off; return 444; }
        location ~* (aws-secret|credentials|config)\.(json|yml|yaml)$ { access_log off; return 444; }
        location ~* (app\.yaml|docker-compose|Dockerfile|Makefile|Gemfile)$ { access_log off; return 444; }
        location ~* ^/(SDK|cgi-bin|geoserver|webui|webdb|websql|webadmin) { access_log off; return 444; }
        location ~* ^/(debug/pprof|metrics|resolve|query|dns-query) { access_log off; return 444; }
        location ~* ^/api/(upload|uploads|upwload|media|images|photos|gallery|files|documents|attachments|content|assets|account|profile|users)(/|$) { access_log off; return 444; }
        # ⚠ seedream 에서는 /api/webhook 가 아니라 /webhook/seedream 이라 이 패턴 유지해도 무해.
        location ~* ^/api/(stripe|webhook|credentials|config|login|user)\.(js|ts|json)$ { access_log off; return 444; }
        location ~* ^/api/v2/ { access_log off; return 444; }
        location ~* ^/(Dr0v|aab9|aaa9)$ { access_log off; return 444; }

        # ══════════════════════════════════════
        # SPA 정적 파일 서빙 (seedream 전용 root — wow-gift 와 완전 분리)
        # ──────────────────────────────────────
        #   C:/deploy-server/seedream-gift/client/
        #   ├── index.html, assets/...        (고객 SPA)
        #   ├── seedream_admin_portal/        (admin/vite.config.ts base와 일치)
        #   └── seedream_partner_portal/      (partner/vite.config.ts base와 일치)
        # ══════════════════════════════════════
        root C:/deploy-server/seedream-gift/client;
        index index.html;

        location = / {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header X-Content-Type-Options    "nosniff"        always;
            add_header X-Frame-Options           "SAMEORIGIN"     always;
            add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
            try_files /index.html =404;
        }

        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ── API → seedream 백엔드 (103.97.209.131) ──
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://seedream_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # ── Health check passthrough (nginx 경로 검증용) ──
        location = /health {
            access_log off;
            proxy_pass http://seedream_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ══════════════════════════════════════
        # Seedream Webhook 수신 — POST /webhook/seedream
        # ──────────────────────────────────────
        # 송신: Seedream (103.97.209.194) → CF → 이 경로 → 131 Go API
        # 인증: HMAC-SHA256 (Go 레이어) + IP whitelist (이중 방어)
        # 재시도: Seedream 이 backoff 로 5회. nginx 는 200 OK 빠르게 반환.
        # CF real_ip 복원이 http{} 에 선언돼 있어 $remote_addr 은 원 IP.
        # ══════════════════════════════════════
        location = /webhook/seedream {
            # Seedream 프로덕션 아웃바운드 IP 고정. 서버 이전 시 갱신.
            allow 103.97.209.194;
            deny all;

            limit_req zone=seedream_webhook burst=50 nodelay;

            # POST 전용
            if ($request_method !~ ^(POST)$) { return 405; }

            # webhook 바디 크기 제한
            client_max_body_size 64k;

            proxy_pass http://seedream_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;     # Seedream default 10s 여유
            proxy_send_timeout 30s;
        }

        # ── 관리자 SPA ──
        location /seedream_admin_portal/ {
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /seedream_admin_portal/index.html;
        }

        location /seedream_admin_portal/assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── 파트너 SPA ──
        location /seedream_partner_portal/ {
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /seedream_partner_portal/index.html;
        }

        location /seedream_partner_portal/assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── SPA fallback (클라이언트) ──
        location / {
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /index.html;
        }
    }

    # ══════════════════════════════════════════════════════════════════
    # ▌▌ paysolus.kr (사유서 - ReasonMaker) — 별도 서비스
    # ══════════════════════════════════════════════════════════════════

    # HTTP → HTTPS 리다이렉트
    server {
        listen 80;
        server_name paysolus.kr www.paysolus.kr;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS (메인)
    server {
        listen 443 ssl;
        http2 on;
        server_name paysolus.kr www.paysolus.kr;

        ssl_certificate     C:/nginx/ssl/paysolus.kr/fullchain.pem;
        ssl_certificate_key C:/nginx/ssl/paysolus.kr/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_stapling on;
        ssl_stapling_verify on;

        access_log logs/paysolus.access.log;
        error_log  logs/paysolus.error.log warn;

        # ── 보안 헤더 ──
        # 주의: 내부 Node 앱이 자체 HSTS/CSP/XFO 주입 중. nginx 에서도 always 플래그로
        # 재선언해 에러 응답 커버. 일부 중복은 CSP 이외에는 문제 없음 (브라우저가 first value 사용).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff"        always;
        add_header X-Frame-Options           "SAMEORIGIN"     always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS|HEAD)$) { return 444; }
        if ($is_scanner) { return 444; }

        limit_conn perip    20;
        limit_conn perserver 2000;

        location / {
            proxy_pass http://127.0.0.1:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
    }
}
