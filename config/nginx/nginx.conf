worker_processes auto;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 성능 최적화
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 70;

    access_log logs/access.log;
    error_log  logs/error.log;

    # Gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_comp_level 5;

    # 프록시 버퍼
    proxy_buffer_size 8k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;

    client_max_body_size 10m;

    # WebSocket 연결을 위한 헤더 매핑
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 스캐너 봇 User-Agent 차단
    map $http_user_agent $is_scanner {
        default 0;
        ~*PetalBot 1;
        ~*python-urllib 1;
        ~*python-requests 1;
        ~*libredtail 1;
        ~*PAN.GlobalProtect 1;
        ~*Nuclei 1;
        ~*Nikto 1;
        ~*sqlmap 1;
        ~*dirbuster 1;
        ~*gobuster 1;
        ~*masscan 1;
        ~*zgrab 1;
    }

    # ══════════════════════════════════════════
    # Cloudflare 실 IP 복원 (Cloudflare 프록시 사용 시에만 활성)
    # ──────────────────────────────────────────
    # Cloudflare를 오렌지 구름(프록시) 모드로 사용하면 $remote_addr이 CF 에지 IP로 바뀌어
    # access_log, limit_req, 스캐너 차단 판정이 전부 틀어집니다. 아래 블록이 실제 클라이언트 IP를
    # CF-Connecting-IP 헤더에서 복원합니다.
    #
    # CF IP 목록: https://www.cloudflare.com/ips/  (변경되면 주기적 갱신 필요)
    # Cloudflare 미사용 시 이 블록은 그대로 두거나 주석 처리해도 무방합니다.
    # ══════════════════════════════════════════
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # API Rate Limit 존 정의
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;

    # ══════════════════════════════════════════
    # 업스트림: Go REST API
    # ──────────────────────────────────────────
    # 신규 토폴로지(2-서버):
    #   - Server A (103.97.209.205): nginx + 정적 파일 (본 설정이 실행되는 호스트)
    #   - Server B (103.97.209.131): Go REST API + MSSQL (co-located)
    # ══════════════════════════════════════════
    upstream goapi {
        server 103.97.209.131:52201;
        keepalive 32;
    }

    # ══════════════════════════════════════════
    # seedreamgift.com + www.seedreamgift.com
    # ══════════════════════════════════════════

    # HTTP → HTTPS 리다이렉트
    # Cloudflare를 프록시 모드로 쓰면 CF가 HTTPS를 강제하므로 이 블록 도달 전에 차단되지만,
    # 직접 접근(우회·벤더 테스트) 대비 로컬 리다이렉트를 유지합니다.
    server {
        listen 80;
        server_name seedreamgift.com www.seedreamgift.com;

        # 인증서 발급 중 도메인 검증(Let's Encrypt 등) 경로는 평문 유지
        location /.well-known/pki-validation/ {
            alias C:/nginx/html/.well-known/pki-validation/;
        }
        location /.well-known/acme-challenge/ {
            alias C:/nginx/html/.well-known/acme-challenge/;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── 고객 사이트 (HTTPS) ──
    server {
        listen 443 ssl;
        http2 on;
        server_name seedreamgift.com www.seedreamgift.com;

        # SSL 인증서 경로
        # 옵션 A (권장): Cloudflare Origin Certificate — 15년 무료, CF↔Origin 전용
        #   발급: CF 대시보드 → SSL/TLS → Origin Server → Create Certificate
        #   CF SSL 모드는 "Full (strict)"로 설정해야 검증됨
        # 옵션 B: Let's Encrypt (win-acme / certbot-win)
        ssl_certificate     C:/nginx/ssl/seedreamgift.com/fullchain.pem;
        ssl_certificate_key C:/nginx/ssl/seedreamgift.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── 허용되지 않는 HTTP 메서드 차단 (PROPFIND, TRACE 등) ──
        if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS|HEAD)$) {
            return 444;
        }

        # ── 스캐너 봇 User-Agent 즉시 차단 ──
        if ($is_scanner) {
            return 444;
        }

        # ── 민감 dotfiles 차단 (.well-known 제외) ──
        location ~ /\.(?!well-known) {
            access_log off;
            return 444;
        }

        # ── PHP/CGI/스크립트 프로브 차단 ──
        location ~* \.(php|cgi|asp|aspx|jsp|py|rb|pl|sh|bat|cmd|exe|dll|com)$ {
            access_log off;
            return 444;
        }

        # ── WordPress / CMS 스캐너 차단 ──
        location ~* ^/(vendor|phpunit|lib|laravel|yii|zend|drupal|wordpress|wp-admin|wp-login|wp-content|wp-includes|xmlrpc) {
            access_log off;
            return 444;
        }

        # ── VPN/원격접속 프로브 차단 ──
        location ~* ^/(owa|ecp|RDWeb|Remote|dana-na|sslvpn|vpntunnel|global-protect|ssl-vpn|sonicui|remote/login) {
            access_log off;
            return 444;
        }

        # ── Docker/K8s/인프라 프로브 차단 ──
        location ~* ^/(api/v1/pods|api/v1/nodes|containers/json|v1/statement|api/sonicos|wsman|actuator) {
            access_log off;
            return 444;
        }

        # ── 관리도구 프로브 차단 ──
        location ~* ^/(phpmyadmin|adminer|phpinfo|debug|_profiler|telescope|horizon) {
            access_log off;
            return 444;
        }

        # ── 백업/인증 파일 차단 ──
        location ~* (backup|dump|db)\.(zip|tar|gz|sql|bak)$ {
            access_log off;
            return 444;
        }

        location ~* (aws-secret|credentials|config)\.(json|yml|yaml)$ {
            access_log off;
            return 444;
        }

        location ~* (app\.yaml|docker-compose|Dockerfile|Makefile|Gemfile)$ {
            access_log off;
            return 444;
        }

        # ══════════════════════════════════════
        # SPA 정적 파일 서빙
        # ──────────────────────────────────────
        # 배포 구조 (deploy-admin.ps1이 admin/dist → client/dist/seedream_admin_portal/로 병합):
        #   C:/deploy-server/seedream-gift/client/
        #   ├── index.html, assets/...        (고객 SPA)
        #   ├── seedream_admin_portal/        (관리자 SPA — admin/vite.config.ts base와 일치)
        #   └── seedream_partner_portal/      (파트너 SPA — partner/vite.config.ts base와 일치)
        # ══════════════════════════════════════
        root C:/deploy-server/seedream-gift/client;
        index index.html;

        # ── index.html — 항상 최신 버전 (캐시 금지) ──
        location = / {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            try_files /index.html =404;
        }

        # ── Vite 빌드 자산 — content hash 기반 장기 캐시 ──
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── API → Go 서버 (Server B @ 103.97.209.131) ──
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://goapi;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # ── 관리자 SPA ──
        # admin/vite.config.ts의 base와 정확히 일치해야 에셋 경로 해석이 맞음.
        # 노출 경로 obfuscation(예: /sd_admin_837/)이 필요하면 Vite base와 nginx location,
        # deploy-admin.ps1 복사 대상 경로 세 곳을 동시에 동일 값으로 맞춰야 함.
        location /seedream_admin_portal/ {
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /seedream_admin_portal/index.html;
        }

        # ── 파트너 SPA ──
        location /seedream_partner_portal/ {
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /seedream_partner_portal/index.html;
        }

        # ── SPA fallback (존재하지 않는 경로 → 고객 SPA index.html) ──
        location / {
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /index.html;
        }
    }

    # ══════════════════════════════════════════
    # paysolus.kr (사유서 - ReasonMaker) — 별도 서비스, 유지
    # ══════════════════════════════════════════

    # HTTP → HTTPS 리다이렉트
    server {
        listen 80;
        server_name paysolus.kr www.paysolus.kr;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS (메인)
    server {
        listen 443 ssl;
        http2 on;
        server_name paysolus.kr www.paysolus.kr;

        ssl_certificate     C:/nginx/ssl/paysolus.kr/fullchain.pem;
        ssl_certificate_key C:/nginx/ssl/paysolus.kr/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        client_max_body_size 15m;

        location / {
            proxy_pass http://127.0.0.1:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
    }

}
