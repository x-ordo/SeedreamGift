worker_processes auto;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 성능 최적화
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 70;

    access_log logs/access.log;
    error_log  logs/error.log;

    # Gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_comp_level 5;

    # 프록시 버퍼
    proxy_buffer_size 8k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;

    client_max_body_size 10m;

    # WebSocket 연결을 위한 헤더 매핑
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 스캐너 봇 User-Agent 차단
    map $http_user_agent $is_scanner {
        default 0;
        ~*PetalBot 1;
        ~*python-urllib 1;
        ~*python-requests 1;
        ~*libredtail 1;
        ~*PAN.GlobalProtect 1;
        ~*Nuclei 1;
        ~*Nikto 1;
        ~*sqlmap 1;
        ~*dirbuster 1;
        ~*gobuster 1;
        ~*masscan 1;
        ~*zgrab 1;
        ~*Scrapy 1;
        ~*curl/7 1;
        ~*Go-http-client 1;
        ~*Wget 1;
        ~*nmap 1;
        ~*HttpClient 1;
    }

    # API Rate Limit 존 정의
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;

    upstream goapi {
        server 103.97.209.194:52201;
        keepalive 32;
    }

    # ══════════════════════════════════════════
    # wowgift.co.kr
    # ══════════════════════════════════════════

    # HTTP → HTTPS 리다이렉트
    server {
        listen 80;
        server_name wowgift.co.kr www.wowgift.co.kr;

        location /.well-known/pki-validation/ {
            alias C:/nginx/html/.well-known/pki-validation/;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS 메인 서버 ──
    server {
        listen 443 ssl;
        http2 on;
        server_name wowgift.co.kr www.wowgift.co.kr;

        ssl_certificate     C:/nginx/ssl/wowgift.co.kr/fullchain.pem;
        ssl_certificate_key C:/nginx/ssl/wowgift.co.kr/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ════════════════════════════════════════
        # 보안 차단 규칙
        # ════════════════════════════════════════

        # ── 허용되지 않는 HTTP 메서드 차단 ──
        if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS|HEAD)$) {
            return 444;
        }

        # ── 스캐너 봇 User-Agent 차단 ──
        if ($is_scanner) {
            return 444;
        }

        # ── 민감 dotfiles 차단 (.well-known 제외) ──
        location ~ /\.(?!well-known) {
            access_log off;
            return 444;
        }

        # ── PHP/CGI/스크립트 프로브 차단 ──
        location ~* \.(php|cgi|asp|aspx|jsp|py|rb|pl|sh|bat|cmd|exe|dll|com)$ {
            access_log off;
            return 444;
        }

        # ── CMS/프레임워크 스캐너 차단 ──
        location ~* ^/(vendor|phpunit|lib|laravel|yii|zend|drupal|wordpress|wp-admin|wp-login|wp-content|wp-includes|xmlrpc) {
            access_log off;
            return 444;
        }

        # ── VPN/원격접속 프로브 차단 ──
        location ~* ^/(owa|ecp|RDWeb|Remote|dana-na|sslvpn|vpntunnel|global-protect|ssl-vpn|sonicui|remote/login) {
            access_log off;
            return 444;
        }

        # ── Docker/K8s/인프라 프로브 차단 ──
        location ~* ^/(api/v1/pods|api/v1/nodes|containers/json|v1/statement|api/sonicos|wsman|actuator) {
            access_log off;
            return 444;
        }

        # ── 관리도구 프로브 차단 ──
        location ~* ^/(phpmyadmin|adminer|phpinfo|debug|_profiler|telescope|horizon) {
            access_log off;
            return 444;
        }

        # ── 백업/인증 파일 차단 ──
        location ~* (backup|dump|db)\.(zip|tar|gz|sql|bak)$ {
            access_log off;
            return 444;
        }

        location ~* (aws-secret|credentials|config)\.(json|yml|yaml)$ {
            access_log off;
            return 444;
        }

        location ~* (app\.yaml|docker-compose|Dockerfile|Makefile|Gemfile)$ {
            access_log off;
            return 444;
        }

        # ── [NEW] IoT/라우터 스캐너 차단 (api.log 분석 기반) ──
        location ~* ^/(SDK|cgi-bin|geoserver|webui|webdb|websql|webadmin) {
            access_log off;
            return 444;
        }

        # ── [NEW] Go pprof / Prometheus 디버그 프로브 차단 ──
        location ~* ^/(debug/pprof|metrics|resolve|query|dns-query) {
            access_log off;
            return 444;
        }

        # ── [NEW] 파일 업로드 스캐너 차단 (존재하지 않는 업로드 경로) ──
        location ~* ^/api/(upload|uploads|upwload|media|images|photos|gallery|files|documents|attachments|content|assets|account|profile|users)(/|$) {
            # /api/v1/ 정규 경로가 아닌 /api/uploads 등의 스캐닝 차단
            # 정규 API는 /api/v1/ 접두사를 사용하므로 이 규칙에 해당하지 않음
            access_log off;
            return 444;
        }

        # ── [NEW] API 키/결제 정보 스캐너 차단 ──
        location ~* ^/api/(stripe|webhook|credentials|config|login|user)\.(js|ts|json)$ {
            access_log off;
            return 444;
        }

        location ~* ^/api/v2/ {
            access_log off;
            return 444;
        }

        # ── [NEW] 임의 문자열 프로브 차단 (짧은 랜덤 경로) ──
        location ~* ^/(Dr0v|aab9|aaa9)$ {
            access_log off;
            return 444;
        }

        # ════════════════════════════════════════
        # SPA 정적 파일 서빙
        # ════════════════════════════════════════

        root C:/deploy-server/wow-gift/client;
        index index.html;

        # ── index.html — 항상 최신 버전 (캐시 금지) ──
        location = / {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            try_files /index.html =404;
        }

        # ── Vite 빌드 자산 — content hash 기반 장기 캐시 ──
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ════════════════════════════════════════
        # API → Go 서버 (Server B)
        # ════════════════════════════════════════

        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://goapi;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # ════════════════════════════════════════
        # 관리자 SPA — /wow_admin_portal/
        # ════════════════════════════════════════

        location /wow_admin_portal/ {
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /wow_admin_portal/index.html;
        }

        # Vite 빌드 자산 (admin)
        location /wow_admin_portal/assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ════════════════════════════════════════
        # 파트너 SPA — /wow_partner_portal/
        # ════════════════════════════════════════

        location /wow_partner_portal/ {
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /wow_partner_portal/index.html;
        }

        # Vite 빌드 자산 (partner)
        location /wow_partner_portal/assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ════════════════════════════════════════
        # 레거시 URL 리다이렉트
        # ════════════════════════════════════════

        location /wow_admin_837/ {
            return 301 /wow_admin_portal/;
        }

        # ════════════════════════════════════════
        # SPA fallback (클라이언트)
        # ════════════════════════════════════════

        location / {
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /index.html;
        }
    }

    # ══════════════════════════════════════════
    # paysolus.kr (사유서 - ReasonMaker)
    # ══════════════════════════════════════════

    # HTTP → HTTPS 리다이렉트
    server {
        listen 80;
        server_name paysolus.kr www.paysolus.kr;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS (메인)
    server {
        listen 443 ssl;
        http2 on;
        server_name paysolus.kr www.paysolus.kr;

        ssl_certificate     C:/nginx/ssl/paysolus.kr/fullchain.pem;
        ssl_certificate_key C:/nginx/ssl/paysolus.kr/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        client_max_body_size 15m;

        location / {
            proxy_pass http://127.0.0.1:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
    }

}
