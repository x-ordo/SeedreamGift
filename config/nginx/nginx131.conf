# ──────────────────────────────────────────────────────────────
# 131 역할: SeedreamGift Go REST API (:52201) + MSSQL 동거
# 공인 트래픽 경로:
#   Cloudflare → 205 nginx (TLS 종단) → 131:52201 (평문 HTTP)
#
# nginx 를 여기 두지 않는 이유:
#   1. 205 가 이미 TLS 종단 수행. 이중 TLS 는 인증서 관리 비용 2배.
#   2. Go API (Gin) 는 production-ready HTTP 서버로 nginx 없이도 동작.
#   3. 단일 서버 다중 레이어는 blast radius 감소 효과 미미.
#
# 131 방화벽 정책 (권장):
#   - 52201 inbound: 103.97.209.205 (205 nginx) + 127.0.0.1 만 허용
#   - MSSQL 1433: 127.0.0.1 전용, 외부 전면 차단
#
# 재검토 트리거 (이 결정을 뒤집을 조건):
#   - 컴플라이언스 요구로 205↔131 TLS 재암호화 필요 시
#   - 131 이 여러 서비스 호스팅하게 되어 도메인 분기 필요 시
#   - Cloudflare Tunnel 도입으로 공인망 노출 제거 시
#
# 이 파일은 의도적으로 "빈 설정"을 문서화한 placeholder 입니다.
