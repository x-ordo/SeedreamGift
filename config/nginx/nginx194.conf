# ══════════════════════════════════════════════════════════════
# Server B (103.97.209.194)
# 1) api.wowgift.co.kr   → Go API (:52201)
# 2) test.seedreamapi.kr → 시드림 API 테스트 (:41927)
# 3) seedreamapi.kr      → 시드림 API 운영   (:41928)
# 배치 경로: C:\nginx\conf\nginx.conf
# SSL 인증서: C:\nginx\ssl\
# ══════════════════════════════════════════════════════════════

worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ── Cloudflare 실제 클라이언트 IP 복원 (2026-04 기준) ──
    # Cloudflare 프록시 뒤에서 $remote_addr가 엣지 IP가 되므로
    # CF-Connecting-IP 헤더로 실제 클라이언트 IP를 복원.
    # 최신 목록: https://www.cloudflare.com/ips/
    # IPv4
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    # IPv6
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # ── 성능 ──
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 70;

    # ── 로깅 ──
    access_log logs/access.log;
    error_log  logs/error.log;

    # ── 본문 크기 제한 ──
    client_max_body_size 10m;

    # ── Gzip ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_comp_level 5;

    # ── 스캐너 봇 차단 (공용) ──
    map $http_user_agent $is_scanner {
        default 0;
        ~*PetalBot          1;
        ~*python-urllib      1;
        ~*python-requests    1;
        ~*libredtail         1;
        ~*PAN.GlobalProtect  1;
        ~*Nuclei             1;
        ~*Nikto              1;
        ~*sqlmap             1;
        ~*dirbuster          1;
        ~*gobuster           1;
        ~*masscan            1;
        ~*zgrab              1;
        ~*Nmap               1;
        ~*wfuzz              1;
        ~*acunetix           1;
        ~*burpsuite          1;
        ~*scrapy             1;
        ~*libwww-perl        1;
        ~*mechanize          1;
        ~*phantomjs          1;
        ~*headlesschrome     1;
        ~*semrush            1;
        ~*ahref              1;
        ~*mj12bot            1;
        ~*dotbot             1;
        ~*bytespider         1;
        ~*gptbot             1;
        ""                   1;
    }

    # ── 키움페이 통지 IP 화이트리스트 ──
    geo $kiwoom_ip {
        default          0;
        123.140.121.205  1;   # 키움페이 개발
        27.102.213.200   1;   27.102.213.201   1;   27.102.213.202   1;
        27.102.213.203   1;   27.102.213.204   1;   27.102.213.205   1;
        27.102.213.206   1;   27.102.213.207   1;   27.102.213.208   1;
        27.102.213.209   1;   # 키움페이 운영
        127.0.0.1        1;
    }

    # ── Rate Limiting ──
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=seedream_general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=kiwoompay_notify:10m rate=30r/s;

    # ── Upstream 풀 (keepalive로 TCP 핸드셰이크 비용 제거) ──
    # keepalive 32 = upstream 워커당 idle 연결 32개 유지
    # proxy_http_version 1.1 + Connection "" 헤더와 함께 location에서 사용
    upstream wowgift_api {
        server 127.0.0.1:52201;
        keepalive 32;
        keepalive_timeout 60s;
        keepalive_requests 1000;
    }
    upstream seedream_test {
        server 127.0.0.1:41927;
        keepalive 32;
        keepalive_timeout 60s;
        keepalive_requests 1000;
    }
    upstream seedream_prod {
        server 127.0.0.1:41928;
        keepalive 32;
        keepalive_timeout 60s;
        keepalive_requests 1000;
    }

    # ── 공용 보안 헤더 (모든 HTTPS server 블록에서 include) ──
    # nginx에는 include 매크로가 없어 server 블록마다 add_header를 반복 작성합니다.
    # 향후 외부 파일(snippets/security_headers.conf)로 분리 가능.

    # ══════════════════════════════════════════════════════════════
    # [1] api.wowgift.co.kr → Go API (:52201)
    # ══════════════════════════════════════════════════════════════

    server {
        listen 80;
        server_name api.wowgift.co.kr;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name api.wowgift.co.kr;

        ssl_certificate     C:/nginx/ssl/wowgift.co.kr/fullchain.pem;
        ssl_certificate_key C:/nginx/ssl/wowgift.co.kr/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        # ssl_stapling: Cloudflare Origin CA는 사설 CA(issuer cert nginx 미등록)이므로 비활성.
        # 만약 향후 Let's Encrypt 등 공개 CA로 전환 시 다시 활성화 권장.

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

        if ($request_method !~ ^(GET|HEAD|POST|PUT|PATCH|DELETE|OPTIONS)$) {
            return 444;
        }

        if ($is_scanner) { return 444; }

        location ~ /\.(?!well-known) {
            access_log off;
            return 444;
        }

        location ~* \.(php|cgi|asp|aspx|jsp|py|rb|pl|sh|bat|cmd|exe|dll|com)$ {
            access_log off;
            return 444;
        }

        location ~* ^/(vendor|phpunit|laravel|wordpress|wp-admin|wp-login|wp-content|wp-includes|xmlrpc|phpmyadmin|adminer|phpinfo|actuator) {
            access_log off;
            return 444;
        }

        location ~* ^/(owa|ecp|RDWeb|Remote|dana-na|sslvpn|vpntunnel|global-protect|ssl-vpn|sonicui|remote/login) {
            access_log off;
            return 444;
        }

        location ~* ^/(api/v1/pods|api/v1/nodes|containers/json|wsman) {
            access_log off;
            return 444;
        }

        location /api/v1/auth/ {
            limit_req zone=api_auth burst=10 nodelay;
            proxy_pass http://wowgift_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        location = /health {
            allow 127.0.0.1;
            allow 103.97.209.205;
            deny all;
            proxy_pass http://wowgift_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location / {
            limit_req zone=api_general burst=50 nodelay;
            proxy_pass http://wowgift_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }
    }

    # ══════════════════════════════════════════════════════════════
    # [2] test.seedreamapi.kr → 시드림 API 테스트 (:41927)
    # ══════════════════════════════════════════════════════════════

    # ── HTTP → HTTPS 리다이렉트 ──
    server {
        listen 80;
        server_name test.seedreamapi.kr;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS (테스트) ──
    server {
        listen 443 ssl;
        http2 on;
        server_name test.seedreamapi.kr;

        ssl_certificate     C:/nginx/ssl/seedreamapi.kr/fullchain.pem;
        ssl_certificate_key C:/nginx/ssl/seedreamapi.kr/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SEEDREAM_SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        # ssl_stapling: Cloudflare Origin CA는 사설 CA(issuer cert nginx 미등록)이므로 비활성.
        # 만약 향후 Let's Encrypt 등 공개 CA로 전환 시 다시 활성화 권장.

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

        if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS)$) {
            return 444;
        }

        if ($is_scanner) { return 444; }

        location ~ /\.(?!well-known) {
            access_log off;
            return 444;
        }

        location ~* \.(php|cgi|asp|aspx|jsp|py|rb|pl|sh|bat|cmd|exe|dll|com)$ {
            access_log off;
            return 444;
        }

        location ~* ^/(vendor|phpunit|wordpress|wp-admin|wp-login|wp-content|xmlrpc|phpmyadmin|adminer|actuator) {
            access_log off;
            return 444;
        }

        # ── 통지 콜백 (키움페이 IP만) ──
        location /notification/ {
            if ($kiwoom_ip = 0) { return 403; }

            limit_req zone=kiwoompay_notify burst=50 nodelay;

            proxy_pass http://seedream_test;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            access_log logs/kiwoompay_notification.log;
        }

        # ── 헬스체크 (내부 모니터링만) ──
        location = /health {
            allow 127.0.0.1;
            allow 103.97.209.0/24;   # 같은 데이터센터 내부
            deny all;
            proxy_pass http://seedream_test;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ── Swagger (테스트 전용 — 운영 도메인에는 노출 안 함) ──
        location /swagger/ {
            limit_req zone=seedream_general burst=10 nodelay;
            proxy_pass http://seedream_test;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ── 운영자 전용 admin (테스트 환경) ──
        location /admin/ {
            allow 103.97.209.205;
            allow 127.0.0.1;
            allow 175.209.78.150;
            deny all;

            limit_req zone=seedream_general burst=10 nodelay;
            proxy_pass http://seedream_test;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout    180s;
            proxy_read_timeout    180s;
        }

        # ── API ──
        location /api/ {
            limit_req zone=seedream_general burst=20 nodelay;
            proxy_pass http://seedream_test;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;

            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── 나머지 차단 ──
        location / { return 444; }
    }

    # ══════════════════════════════════════════════════════════════
    # [3] seedreamapi.kr → 시드림 API 운영 (:41928)
    # ══════════════════════════════════════════════════════════════

    # ── HTTP → HTTPS 리다이렉트 ──
    server {
        listen 80;
        server_name seedreamapi.kr api.seedreamapi.kr;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS (운영) ──
    server {
        listen 443 ssl;
        http2 on;
        server_name seedreamapi.kr api.seedreamapi.kr;

        ssl_certificate     C:/nginx/ssl/seedreamapi.kr/fullchain.pem;
        ssl_certificate_key C:/nginx/ssl/seedreamapi.kr/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SEEDREAM_PROD_SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        # ssl_stapling: Cloudflare Origin CA는 사설 CA(issuer cert nginx 미등록)이므로 비활성.
        # 만약 향후 Let's Encrypt 등 공개 CA로 전환 시 다시 활성화 권장.

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

        if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS)$) { return 444; }
        if ($is_scanner) { return 444; }

        location ~ /\.(?!well-known)                                                              { access_log off; return 444; }
        location ~* \.(php|cgi|asp|aspx|jsp|py|rb|pl|sh|bat|cmd|exe|dll|com)$                     { access_log off; return 444; }
        location ~* ^/(vendor|phpunit|wordpress|wp-admin|wp-login|wp-content|xmlrpc|phpmyadmin|adminer|actuator) { access_log off; return 444; }

        # ── 통지 콜백 (키움페이 IP만 — 운영서버 IP 대역 27.102.213.200~209) ──
        location /notification/ {
            if ($kiwoom_ip = 0) { return 403; }
            limit_req zone=kiwoompay_notify burst=50 nodelay;

            proxy_pass http://seedream_prod;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            access_log logs/kiwoompay_notification.log;
        }

        # ── 헬스체크 (내부 모니터링만 — 운영 정보 보호) ──
        location = /health {
            allow 127.0.0.1;
            allow 103.97.209.0/24;
            deny all;
            proxy_pass http://seedream_prod;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ── Swagger 차단 (운영에는 노출 안 함) ──
        location /swagger/ { return 444; }

        # ── 운영자 전용 admin 경로 (X-Admin-Secret 인증 + 네트워크 계층 제한 이중 방어) ──
        # 접근 허용:
        #   - 포털 서버(103.97.209.205) — SUPER_ADMIN UI 의 고정식 풀 관리 호출
        #   - 운영자 본인 IP(아래 allow 에 필요 시 추가) — 수동 curl/점검
        #   - 127.0.0.1 — 같은 서버에서 진단
        # Cloudflare 뒤이므로 $remote_addr 는 CF-Connecting-IP 복원값 사용.
        # 타임아웃: 벌크 발급(VACCOUNT-ASSIGN N건)은 N 에 비례해 오래 걸리므로 180s 여유.
        location /admin/ {
            allow 103.97.209.205;
            allow 127.0.0.1;
            allow 175.209.78.150;   # 운영자
            deny all;

            limit_req zone=seedream_general burst=10 nodelay;

            proxy_pass http://seedream_prod;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;

            proxy_connect_timeout 10s;
            proxy_send_timeout    180s;
            proxy_read_timeout    180s;
        }

        # ── API ──
        location /api/ {
            limit_req zone=seedream_general burst=20 nodelay;

            proxy_pass http://seedream_prod;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;

            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── 나머지 차단 ──
        location / { return 444; }
    }
}
