worker_processes auto;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 성능 최적화
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 70;

    access_log logs/access.log;
    error_log  logs/error.log;

    # Gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_comp_level 5;

    # 프록시 버퍼
    proxy_buffer_size 8k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;

    client_max_body_size 10m;

    # WebSocket 연결을 위한 헤더 매핑
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ══════════════════════════════════════════════════════════════
    # Cloudflare 실 IP 복원 (wowgift.co.kr + seedreamgift.com 공통)
    # ──────────────────────────────────────────────────────────────
    # CF 오렌지 구름 뒤에서 $remote_addr 이 CF 엣지 IP 가 되는 회귀 방지.
    # http{} 스코프라 모든 server 블록에 적용.
    # CF IP 갱신: https://www.cloudflare.com/ips/ (분기별 점검)
    # ══════════════════════════════════════════════════════════════
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # 스캐너 봇 User-Agent 차단
    map $http_user_agent $is_scanner {
        default 0;
        ~*PetalBot 1;
        ~*python-urllib 1;
        ~*python-requests 1;
        ~*libredtail 1;
        ~*PAN.GlobalProtect 1;
        ~*Nuclei 1;
        ~*Nikto 1;
        ~*sqlmap 1;
        ~*dirbuster 1;
        ~*gobuster 1;
        ~*masscan 1;
        ~*zgrab 1;
    }

    # ══════════════════════════════════════════════════════════════
    # Rate Limit 존
    # ──────────────────────────────────────────────────────────────
    # - api_general: 클라이언트 SPA → 백엔드 API 일반 요청
    # - seedream_webhook: Seedream → /webhook/seedream 이벤트 수신 전용
    #   (일반 API 와 간섭 방지. 웹훅은 Seedream 재시도 backoff 로 버스트가 생길 수 있음)
    # ══════════════════════════════════════════════════════════════
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=seedream_webhook:10m rate=30r/s;

    # ══════════════════════════════════════════════════════════════
    # 업스트림
    # ──────────────────────────────────────────────────────────────
    #   wowgift_api    → 103.97.209.194:52201  (기존 운영)
    #   seedream_api   → 103.97.209.131:52201  (신규, API+MSSQL 동거)
    # ══════════════════════════════════════════════════════════════
    upstream wowgift_api {
        server 103.97.209.194:52201;
        keepalive 32;
    }

    upstream seedream_api {
        server 103.97.209.131:52201;
        keepalive 32;
    }

    # ══════════════════════════════════════════════════════════════
    # 3way routing probe — catch-all default_server
    # ──────────────────────────────────────────────────────────────
    # 3개 도메인 (wowgift.co.kr / seedreamgift.com / paysolus.kr) 중
    # server_name 매칭이 안 된 요청은 여기로 빠지고 즉시 444 close.
    #
    # 배경: default_server 를 명시하지 않으면 nginx 는 listen 포트의
    # 첫 server block 을 default 로 사용 → Cloudflare 앞단 Flexible SSL /
    # SNI 누락 시 seedreamgift 요청이 wowgift 블록으로 fallback 되어
    # wowgift HTML 이 응답되는 "도메인 크로스오버" 문제가 발생했었음
    # (2026-04-24 smoke test 에서 확인).
    #
    # 444 = nginx 가 응답 없이 connection close — 스캐너/오탐 방어에도 유용.
    # ══════════════════════════════════════════════════════════════
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    server {
        listen 443 ssl default_server;
        server_name _;
        # catch-all 용 dummy SSL — 실제 SNI 매칭은 이 아래 named server 들이 담당.
        # seedreamgift 인증서 재사용 (SAN 이 apex + www 둘 다 커버).
        ssl_certificate     C:/nginx/ssl/seedreamgift.com/fullchain.pem;
        ssl_certificate_key C:/nginx/ssl/seedreamgift.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        return 444;
    }

    # ══════════════════════════════════════════
    # wowgift.co.kr + admin.wowgift.co.kr
    # ══════════════════════════════════════════

    # HTTP → HTTPS 리다이렉트
    server {
        listen 80;
        server_name wowgift.co.kr www.wowgift.co.kr;

        location /.well-known/pki-validation/ {
            alias C:/nginx/html/.well-known/pki-validation/;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── 고객 사이트 — wowgift.co.kr ──
    server {
        listen 443 ssl;
        http2 on;
        server_name wowgift.co.kr www.wowgift.co.kr;

        ssl_certificate     C:/nginx/ssl/wowgift.co.kr/fullchain.pem;
        ssl_certificate_key C:/nginx/ssl/wowgift.co.kr/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── 허용되지 않는 HTTP 메서드 차단 (PROPFIND, TRACE 등) ──
        if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS|HEAD)$) {
            return 444;
        }

        # ── 스캐너 봇 User-Agent 즉시 차단 ──
        if ($is_scanner) {
            return 444;
        }

        # ── 민감 dotfiles 차단 (.well-known 제외) ──
        location ~ /\.(?!well-known) {
            access_log off;
            return 444;
        }

        # ── PHP/CGI/스크립트 프로브 차단 ──
        location ~* \.(php|cgi|asp|aspx|jsp|py|rb|pl|sh|bat|cmd|exe|dll|com)$ {
            access_log off;
            return 444;
        }

        # ── WordPress / CMS 스캐너 차단 ──
        location ~* ^/(vendor|phpunit|lib|laravel|yii|zend|drupal|wordpress|wp-admin|wp-login|wp-content|wp-includes|xmlrpc) {
            access_log off;
            return 444;
        }

        # ── VPN/원격접속 프로브 차단 ──
        location ~* ^/(owa|ecp|RDWeb|Remote|dana-na|sslvpn|vpntunnel|global-protect|ssl-vpn|sonicui|remote/login) {
            access_log off;
            return 444;
        }

        # ── Docker/K8s/인프라 프로브 차단 ──
        location ~* ^/(api/v1/pods|api/v1/nodes|containers/json|v1/statement|api/sonicos|wsman|actuator) {
            access_log off;
            return 444;
        }

        # ── 관리도구 프로브 차단 ──
        location ~* ^/(phpmyadmin|adminer|phpinfo|debug|_profiler|telescope|horizon) {
            access_log off;
            return 444;
        }

        # ── 백업/인증 파일 차단 ──
        location ~* (backup|dump|db)\.(zip|tar|gz|sql|bak)$ {
            access_log off;
            return 444;
        }

        location ~* (aws-secret|credentials|config)\.(json|yml|yaml)$ {
            access_log off;
            return 444;
        }

        location ~* (app\.yaml|docker-compose|Dockerfile|Makefile|Gemfile)$ {
            access_log off;
            return 444;
        }

        # ── SPA 정적 파일 서빙 ──
        root C:/deploy-server/wow-gift/client;
        index index.html;

        # ── index.html — 항상 최신 버전 사용 (캐시 금지) ──
        location = / {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            try_files /index.html =404;
        }

        # ── Vite 빌드 자산 — content hash 기반 장기 캐시 ──
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── API → Go 서버 (Server B — wowgift 전용) ──
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://wowgift_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # ── 관리자 SPA — /wow_admin_837/ 하위 (client/wow_admin_837/ 에 배치) ──
        location /wow_admin_837/ {
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /wow_admin_837/index.html;
        }

        # ── SPA fallback (존재하지 않는 경로 → client index.html) ──
        location / {
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /index.html;
        }
    }

    # ══════════════════════════════════════════════════════════════
    # seedreamgift.com (신규, Cloudflare 프록시 권장)
    # ──────────────────────────────────────────────────────────────
    # 토폴로지: Cloudflare → 205(nginx, 이 블록) → 131(Go API + MSSQL)
    # SSL: AlphaSign 구매 완료 → C:/nginx/ssl/seedreamgift.com/
    # 주의: 205↔131 구간은 평문 HTTP 프록시. 같은 IDC 내부 트래픽 전제.
    #       컴플라이언스 요구 시 (a) 131 nginx TLS 종단 (b) 사설 VLAN
    #       (c) Cloudflare Tunnel 중 택1 필요. 현재는 주석으로만 명시.
    # ══════════════════════════════════════════════════════════════

    # HTTP → HTTPS 리다이렉트
    server {
        listen 80;
        server_name seedreamgift.com www.seedreamgift.com;

        location /.well-known/pki-validation/ {
            alias C:/nginx/html/.well-known/pki-validation/;
        }
        location /.well-known/acme-challenge/ {
            alias C:/nginx/html/.well-known/acme-challenge/;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── 고객 사이트 (HTTPS) ──
    server {
        listen 443 ssl;
        http2 on;
        server_name seedreamgift.com www.seedreamgift.com;

        ssl_certificate     C:/nginx/ssl/seedreamgift.com/fullchain.pem;
        ssl_certificate_key C:/nginx/ssl/seedreamgift.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SEEDREAM_SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── 허용 메서드 제한 ──
        if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS|HEAD)$) { return 444; }

        # ── 스캐너 봇 차단 ──
        if ($is_scanner) { return 444; }

        # ── 민감 파일/경로 차단 ──
        location ~ /\.(?!well-known) { access_log off; return 444; }
        location ~* \.(php|cgi|asp|aspx|jsp|py|rb|pl|sh|bat|cmd|exe|dll|com)$ { access_log off; return 444; }
        location ~* ^/(vendor|phpunit|lib|laravel|yii|zend|drupal|wordpress|wp-admin|wp-login|wp-content|wp-includes|xmlrpc) { access_log off; return 444; }
        location ~* ^/(owa|ecp|RDWeb|Remote|dana-na|sslvpn|vpntunnel|global-protect|ssl-vpn|sonicui|remote/login) { access_log off; return 444; }
        location ~* ^/(api/v1/pods|api/v1/nodes|containers/json|v1/statement|api/sonicos|wsman|actuator) { access_log off; return 444; }
        location ~* ^/(phpmyadmin|adminer|phpinfo|debug|_profiler|telescope|horizon) { access_log off; return 444; }
        location ~* (backup|dump|db)\.(zip|tar|gz|sql|bak)$ { access_log off; return 444; }
        location ~* (aws-secret|credentials|config)\.(json|yml|yaml)$ { access_log off; return 444; }
        location ~* (app\.yaml|docker-compose|Dockerfile|Makefile|Gemfile)$ { access_log off; return 444; }

        # ══════════════════════════════════════════════════════════
        # SPA 정적 파일 서빙
        # ──────────────────────────────────────────────────────────
        #   C:/deploy-server/seedream-gift/client/
        #   ├── index.html, assets/...          (고객 SPA)
        #   ├── seedream_admin_portal/          (admin Vite base 와 일치)
        #   └── seedream_partner_portal/        (partner Vite base 와 일치)
        # ══════════════════════════════════════════════════════════
        root C:/deploy-server/seedream-gift/client;
        index index.html;

        # index.html 은 항상 최신 (배포 즉시 반영)
        location = / {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            try_files /index.html =404;
        }

        # Vite 자산 — content hash 기반 장기 캐시
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── API → Go 서버 (Server C, 131) ──
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://seedream_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # ══════════════════════════════════════════════════════════
        # Seedream 웹훅 수신 — POST /webhook/seedream
        # ──────────────────────────────────────────────────────────
        # 송신: Seedream (103.97.209.194) → CF → 이 경로 → 131 Go API
        # 수신 이벤트: vaccount.issued / vaccount.deposited /
        #              payment.canceled / vaccount.deposit_canceled /
        #              vaccount.cancelled / deposit_cancel.deposited
        # 인증: HMAC-SHA256 (Go API 레이어에서 검증)
        # 타임아웃: Seedream 쪽 default 10s 이므로 여유 있게 30s
        # 재시도: Seedream 5회 backoff. 우리는 200 OK 빠르게 반환할 것
        #
        # 선택: IP 화이트리스트 이중 방어
        #   HMAC 만으로 충분하지만 Seedream 아웃바운드 IP 가 103.97.209.194 고정이면
        #   네트워크 레이어 차단 추가 가능. 단 Seedream 서버 이전 시 nginx 도
        #   같이 갱신 필요 → 결합도 상승 trade-off. 기본은 주석 상태로 둠.
        # ══════════════════════════════════════════════════════════
        location = /webhook/seedream {
            # ── HMAC + IP 이중 방어 (2026-04-23 활성화) ──
            # Seedream 프로덕션 아웃바운드 IP 고정. Seedream 서버 이전 시 이 값도 갱신 필요.
            # CF 실IP 복원 블록이 http{} 스코프에 선언돼 있어 $remote_addr 은 원 클라이언트 IP.
            allow 103.97.209.194;
            deny all;

            limit_req zone=seedream_webhook burst=50 nodelay;

            # POST 전용. 이외는 차단.
            if ($request_method !~ ^(POST)$) { return 405; }

            proxy_pass http://seedream_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";

            # JSON payload 버퍼링 — signature 검증을 위해 전체 body 필요
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;
            proxy_request_buffering on;

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # 감사 로그 분리 — 결제 이벤트 추적성
            access_log logs/seedream_webhook.log;
        }

        # ── 관리자 SPA — /seedream_admin_portal/ ──
        location /seedream_admin_portal/ {
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /seedream_admin_portal/index.html;
        }

        location /seedream_admin_portal/assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── 파트너 SPA — /seedream_partner_portal/ ──
        location /seedream_partner_portal/ {
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /seedream_partner_portal/index.html;
        }

        location /seedream_partner_portal/assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── SPA fallback (고객) ──
        location / {
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /index.html;
        }
    }

    # ══════════════════════════════════════════
    # paysolus.kr (사유서 - ReasonMaker)
    # ══════════════════════════════════════════

    # HTTP → HTTPS 리다이렉트
    server {
        listen 80;
        server_name paysolus.kr www.paysolus.kr;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS (메인)
    server {
        listen 443 ssl;
        http2 on;
        server_name paysolus.kr www.paysolus.kr;

        ssl_certificate     C:/nginx/ssl/paysolus.kr/fullchain.pem;
        ssl_certificate_key C:/nginx/ssl/paysolus.kr/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        client_max_body_size 15m;

        location / {
            proxy_pass http://127.0.0.1:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
    }

}
