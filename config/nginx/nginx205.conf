worker_processes auto;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ── 서버 정보 숨김 (핑거프린팅 방지) ──
    # Server 헤더에서 nginx 버전 제거, 에러 페이지에서도 숨김.
    # 공격자의 CVE 매칭 난이도↑.
    server_tokens off;

    # ── 성능 ──
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 70;
    keepalive_requests 1000;

    # ── Slowloris 방어 (커넥션 고갈 공격 대응) ──
    # 느린 클라이언트가 헤더/바디를 질질 끌며 워커를 점유하는 공격 차단.
    client_header_timeout 10s;
    client_body_timeout   10s;
    send_timeout          10s;
    reset_timedout_connection on;

    access_log logs/access.log;
    error_log  logs/error.log warn;

    # ── 압축 ──
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_comp_level 5;
    # BREACH 완화: 민감 응답에는 gzip off 가 안전하지만, CSRF 토큰 기반이라 현재는 허용.

    # ── 프록시 ──
    proxy_buffer_size 8k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;
    client_max_body_size 15m;   # paysolus 업로드 여유
    client_body_buffer_size 128k;

    # 백엔드 정보 노출 차단
    proxy_hide_header X-Powered-By;
    proxy_hide_header X-AspNet-Version;
    proxy_hide_header X-AspNetMvc-Version;

    # ── TLS 공통 하드닝 ──
    # 세션 재개로 핸드셰이크 비용 절감. tickets off 는 forward secrecy 강화
    # (티켓키 유출 시 과거 세션 복호화 위험 제거).
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # Mozilla intermediate 호환 — TLS1.2/1.3 에서 forward-secrecy cipher 만 허용.
    # aNULL/MD5/RC4/3DES/SHA1 명시 차단.
    ssl_ciphers         ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:HIGH:!aNULL:!MD5:!RC4:!3DES:!SHA1;
    ssl_prefer_server_ciphers off;   # TLS1.3 호환

    # ── WebSocket ──
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ══════════════════════════════════════════════════════════════
    # Cloudflare 실 IP 복원 — http{} 스코프 (모든 server 에 적용)
    # ──────────────────────────────────────────────────────────────
    # CF 오렌지 구름 뒤에서 $remote_addr 이 CF 엣지 IP 가 되는 회귀 방지.
    # rate limit / IP whitelist / 로그가 실제 클라이언트 IP 로 작동하도록.
    # CF IP 갱신: https://www.cloudflare.com/ips/ (분기별 점검)
    # ══════════════════════════════════════════════════════════════
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header   CF-Connecting-IP;
    real_ip_recursive on;

    # ══════════════════════════════════════════════════════════════
    # Scanner / Bot user-agent 차단 map
    # ══════════════════════════════════════════════════════════════
    map $http_user_agent $is_scanner {
        default            0;
        ""                 1;          # 빈 UA 는 대부분 봇
        ~*PetalBot         1;
        ~*python-urllib    1;
        ~*python-requests  1;
        ~*libwww-perl      1;
        ~*wget             1;
        ~*sqlmap           1;
        ~*dirbuster        1;
        ~*gobuster         1;
        ~*ffuf             1;
        ~*wfuzz            1;
        ~*nuclei           1;
        ~*masscan          1;
        ~*zgrab            1;
        ~*nikto            1;
        ~*acunetix         1;
        ~*nessus           1;
        ~*openvas          1;
        ~*wpscan           1;
        ~*semrush          1;
        ~*ahrefs           1;
        ~*mj12bot          1;
    }

    # ══════════════════════════════════════════════════════════════
    # 허용 HTTP 메서드 화이트리스트
    # ──────────────────────────────────────────────────────────────
    # TRACE/CONNECT/DEBUG 등 위험 메서드 차단.
    # 각 server 에서 `if ($not_allowed_method) { return 444; }` 로 적용.
    # ══════════════════════════════════════════════════════════════
    map $request_method $not_allowed_method {
        default  1;
        GET      0;
        HEAD     0;
        POST     0;
        PUT      0;
        PATCH    0;
        DELETE   0;
        OPTIONS  0;
    }

    # ══════════════════════════════════════════════════════════════
    # Rate / Connection limit zones
    # ══════════════════════════════════════════════════════════════
    limit_req_zone  $binary_remote_addr zone=api_general:10m       rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=seedream_webhook:10m  rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=perip:10m;
    limit_conn_zone $server_name        zone=perserver:10m;

    # ══════════════════════════════════════════════════════════════
    # Upstreams (독립 Go API 서버들)
    # ──────────────────────────────────────────────────────────────
    #   wowgift_api    → 103.97.209.194:52201 (legacy)
    #   seedream_api   → 103.97.209.131:52201 (API + MSSQL 동거)
    # ══════════════════════════════════════════════════════════════
    upstream wowgift_api {
        server 103.97.209.194:52201;
        keepalive 32;
    }
    upstream seedream_api {
        server 103.97.209.131:52201;
        keepalive 32;
    }

    # ══════════════════════════════════════════════════════════════
    # 공통 보안 헤더 스니펫 — include 로 각 https server 에 주입
    # ──────────────────────────────────────────────────────────────
    # `always` 플래그: 4xx/5xx 응답에도 헤더 부착 (기본 add_header 는 2xx/3xx/204/301/302/303/304/307/308 만).
    # HSTS max-age=2592000 (30일) — 첫 롤아웃 보수값. 안정 후 31536000/63072000 승격.
    # preload 는 초기 롤아웃에서 제외 (실수 시 제거 난이도 극고).
    # CSP 는 프론트 인벤토리 먼저 작성 후 적용 예정 (인라인 스크립트/스타일 영향).
    # ══════════════════════════════════════════════════════════════
    #
    # NOTE: nginx 에서 map 으로 헤더 값을 생성할 수는 있지만 include 파일 분리가 가장 깔끔.
    # 현재는 각 server 블록에 직접 기입 (conf 파일 1개 유지 정책).

    # ═══════════════════════════════════════════════════════════════════
    # [0] CATCH-ALL default_server — 3-way probing 분리
    # ───────────────────────────────────────────────────────────────────
    # 3개 지정 도메인 외 모든 요청을 여기서 차단. 2026-04-24 smoke 에서
    # seedreamgift 요청이 wowgift 블록으로 fallback 되던 "도메인 크로스오버"
    # 문제의 근본 해결책.
    #
    # HTTPS 는 ssl_reject_handshake on 으로 TLS handshake 자체 reject:
    #   - dummy 인증서 불필요 (ssl_certificate 와 mutually exclusive)
    #   - SNI 매칭 실패 시 cert 제공 없이 즉시 끊김 → 정보 노출 0
    #   - nginx 1.19.4+ 필요
    # HTTP 는 return 444 (connection close without response).
    # ═══════════════════════════════════════════════════════════════════
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    server {
        listen 443 ssl default_server;
        http2 on;
        ssl_reject_handshake on;
    }

    # ═══════════════════════════════════════════════════════════════════
    # [1] WOWGIFT.CO.KR  →  C:/deploy-server/wow-gift/client
    # ═══════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name wowgift.co.kr www.wowgift.co.kr;
        # SSL 갱신용 HTTP-01 validation
        location /.well-known/pki-validation/ { alias C:/nginx/html/.well-known/pki-validation/; }
        location / { return 301 https://$host$request_uri; }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name wowgift.co.kr www.wowgift.co.kr;

        ssl_certificate     C:/nginx/ssl/wowgift.co.kr/fullchain.pem;
        ssl_certificate_key C:/nginx/ssl/wowgift.co.kr/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # 도메인별 로그 분리 (포렌식 용이)
        access_log logs/wowgift.access.log;
        error_log  logs/wowgift.error.log warn;

        # ── 보안 헤더 (모두 always 로 에러 응답에도 적용) ──
        add_header Strict-Transport-Security "max-age=2592000" always;
        add_header X-Content-Type-Options    "nosniff"        always;
        add_header X-Frame-Options           "SAMEORIGIN"     always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin"   always;
        add_header Cross-Origin-Resource-Policy "same-site"   always;

        # ── 접근 차단 ──
        if ($is_scanner)          { return 444; }
        if ($not_allowed_method)  { return 444; }

        # 동시 커넥션 (DDoS 완화)
        limit_conn perip    20;
        limit_conn perserver 2000;

        # 민감/탐색 경로 즉시 차단 (워드프레스·git·env 등)
        location ~* ^/(\.env|\.git|\.ht|\.svn|\.DS_Store|wp-admin|wp-login|wp-content|xmlrpc\.php|phpmyadmin|phpMyAdmin|\.aws|config\.php|composer\.(json|lock)|package(-lock)?\.json) {
            return 444;
        }
        location ~* \.(sql|bak|old|backup|swp|tar|tgz|zip|7z)$ {
            return 444;
        }

        # ★ 격리: 이 server 블록 전용 root
        root  C:/deploy-server/wow-gift/client;
        index index.html;

        location = / {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            # 헤더 상속: add_header 는 하위 블록에서 재선언 시 상위 전체 무효화되므로
            # 보안 헤더를 다시 선언해준다 (nginx add_header 지시어의 inheritance 규칙).
            add_header Strict-Transport-Security "max-age=2592000" always;
            add_header X-Content-Type-Options    "nosniff"        always;
            add_header X-Frame-Options           "SAMEORIGIN"     always;
            add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
            try_files /index.html =404;
        }
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # API → wowgift Go 서버 (103.97.209.194)
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://wowgift_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # ═══════════════════════════════════════════════════════════════════
    # [2] SEEDREAMGIFT.COM  →  C:/deploy-server/seedream-gift/client
    # ═══════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name seedreamgift.com www.seedreamgift.com;
        location /.well-known/pki-validation/ { alias C:/nginx/html/.well-known/pki-validation/; }
        location / { return 301 https://$host$request_uri; }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name seedreamgift.com www.seedreamgift.com;

        ssl_certificate     C:/nginx/ssl/seedreamgift.com/fullchain.pem;
        ssl_certificate_key C:/nginx/ssl/seedreamgift.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        access_log logs/seedream.access.log;
        error_log  logs/seedream.error.log warn;

        # ── 보안 헤더 ──
        add_header Strict-Transport-Security "max-age=2592000" always;
        add_header X-Content-Type-Options    "nosniff"        always;
        add_header X-Frame-Options           "SAMEORIGIN"     always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=(self)" always;
        add_header Cross-Origin-Opener-Policy "same-origin"   always;
        # payment=(self) 유지: 결제 위젯(키움페이) 은 iframe/redirect 방식이라 self 허용.

        # ── 접근 차단 ──
        if ($is_scanner)          { return 444; }
        if ($not_allowed_method)  { return 444; }

        limit_conn perip    20;
        limit_conn perserver 2000;

        location ~* ^/(\.env|\.git|\.ht|\.svn|\.DS_Store|wp-admin|wp-login|wp-content|xmlrpc\.php|phpmyadmin|phpMyAdmin|\.aws|config\.php|composer\.(json|lock)|package(-lock)?\.json) {
            return 444;
        }
        location ~* \.(sql|bak|old|backup|swp|tar|tgz|zip|7z)$ {
            return 444;
        }

        # ★ 격리: seedream 전용 root (wow-gift 와 완전 분리)
        # 구조:
        #   C:/deploy-server/seedream-gift/client/
        #   ├── index.html, assets/...           (고객 SPA)
        #   ├── seedream_admin_portal/           (admin Vite base)
        #   └── seedream_partner_portal/        (partner Vite base)
        root  C:/deploy-server/seedream-gift/client;
        index index.html;

        location = / {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Strict-Transport-Security "max-age=2592000" always;
            add_header X-Content-Type-Options    "nosniff"        always;
            add_header X-Frame-Options           "SAMEORIGIN"     always;
            add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
            try_files /index.html =404;
        }
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # API → seedream Go 서버 (103.97.209.131)
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://seedream_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # ── Health check passthrough (nginx 경로 검증용) ──
        location = /health {
            access_log off;
            proxy_pass http://seedream_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ══════════════════════════════════════════════════════════
        # Seedream Webhook 수신 — POST /webhook/seedream
        # ──────────────────────────────────────────────────────────
        # 송신: Seedream (103.97.209.194) → CF → 이 경로 → 131 Go API
        # 인증: HMAC-SHA256 (Go 레이어) + IP whitelist (이중 방어)
        # 재시도: Seedream 이 backoff 로 5회. nginx 는 200 OK 빠르게 반환.
        # CF real_ip 복원이 http{} 에 선언돼 있어 $remote_addr 은 원 IP.
        # ══════════════════════════════════════════════════════════
        location = /webhook/seedream {
            # Seedream 프로덕션 아웃바운드 IP 고정. 서버 이전 시 갱신.
            allow 103.97.209.194;
            deny all;

            limit_req zone=seedream_webhook burst=50 nodelay;
            # 본 location 에서는 스캐너 UA 체크 skip (Seedream 이 UA 변경 가능).
            # IP whitelist + HMAC 이 실제 방어선.

            # POST 전용
            if ($request_method !~ ^(POST)$) { return 405; }

            # webhook 바디 크기 제한 (2026-04-24 샘플 ~1KB)
            client_max_body_size 64k;

            proxy_pass http://seedream_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;     # Seedream default 10s 여유
            proxy_send_timeout 30s;
        }

        # SPA fallback (admin/partner 하위경로 포함)
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # ═══════════════════════════════════════════════════════════════════
    # [3] PAYSOLUS.KR  →  127.0.0.1:4000 (Node/Internal App)
    # ═══════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name paysolus.kr www.paysolus.kr;
        location / { return 301 https://$host$request_uri; }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name paysolus.kr www.paysolus.kr;

        ssl_certificate     C:/nginx/ssl/paysolus.kr/fullchain.pem;
        ssl_certificate_key C:/nginx/ssl/paysolus.kr/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        access_log logs/paysolus.access.log;
        error_log  logs/paysolus.error.log warn;

        # ── 보안 헤더 ──
        add_header Strict-Transport-Security "max-age=2592000" always;
        add_header X-Content-Type-Options    "nosniff"        always;
        add_header X-Frame-Options           "SAMEORIGIN"     always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        if ($is_scanner)          { return 444; }
        if ($not_allowed_method)  { return 444; }

        limit_conn perip    20;
        limit_conn perserver 2000;

        # 전량 내부 앱으로 리버스 프록시 (static root 없음)
        location / {
            proxy_pass http://127.0.0.1:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
