# nginx-security.conf
# Bot/Scanner blocking rules for 씨드림기프트 production server
# Include this file in nginx.conf: include /path/to/nginx-security.conf;

# ── Block sensitive dotfiles (.env, .git, .htaccess, etc.) ──
# Exception: .well-known (SSL validation, etc.)
location ~ /\.(?!well-known) {
    deny all;
    return 444;  # Drop connection silently (no response body)
}

# ── Block PHP/CGI exploit probes ──
location ~* \.(php|cgi|asp|aspx|jsp|py|rb|pl|sh|bat|cmd|exe|dll|com)$ {
    return 444;
}

# ── Block common vulnerability scanner paths ──
location ~* ^/(vendor|phpunit|lib|laravel|yii|zend|drupal|wordpress|wp-admin|wp-login|wp-content|wp-includes) {
    return 444;
}

# ── Block VPN/Remote Desktop scanner probes ──
location ~* ^/(owa|ecp|RDWeb|Remote|dana-na|dana-cached|sslvpn|vpntunnel|global-protect|ssl-vpn|sonicui|remote/login|myvpn|svpn) {
    return 444;
}

# ── Block Docker/K8s/Infrastructure probes ──
location ~* ^/(api/v1/pods|api/v1/nodes|containers/json|v1/statement|api/sonicos|wsman) {
    return 444;
}

# ── Block sitemap/robots probes from unknown bots ──
# (Allow legit crawlers via User-Agent in separate rule if needed)
location = /sitemap.xml {
    return 404;
}

# ── Block common scanner User-Agents at nginx level ──
# (Handled via map + if in http block)
# Add this in the http {} block:
#
# map $http_user_agent $is_scanner {
#     default 0;
#     ~*PetalBot 1;
#     ~*python-urllib 1;
#     ~*libredtail 1;
#     ~*PAN.GlobalProtect 1;
# }
#
# Then in server {} block:
# if ($is_scanner) { return 444; }

# ── Rate limit for general API calls ──
# (Already defined in main nginx.conf: limit_req_zone)
location /api/ {
    limit_req zone=api_general burst=20 nodelay;
    proxy_pass http://nestjs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
}
