        type: integer
    required:
    - quantity
    type: object
  internal_api_handlers.CheckReceiverRequest:
    properties:
      email:
        example: user@example.com
        type: string
    required:
    - email
    type: object
  internal_api_handlers.CreateSiteConfigRequest:
    properties:
      description:
        example: 일일 최대 구매 한도 (원)
        type: string
      key:
        example: PURCHASE_LIMIT_DAILY
        type: string
      type:
        example: NUMBER
        type: string
      value:
        example: "1000000"
        type: string
    required:
    - key
    - type
    - value
    type: object
  internal_api_handlers.LoginRequest:
    properties:
      email:
