      productId:
        type: integer
      quantity:
        minimum: 1
        type: integer
    required:
    - productId
    - quantity
    type: object
  internal_api_handlers.CartBatchRemoveRequest:
    properties:
      productIds:
        items:
          type: integer
        type: array
    required:
    - productIds
    type: object
  internal_api_handlers.CartUpdateQuantityRequest:
    properties:
      quantity:
